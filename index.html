<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome DANTANIS GROUP</title>
    <style>
        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
            /* Bottom bar ke liye extra space taaki content na chhupe */
            padding-bottom: 70px; 
        }

        /* Navbar Layout with Circle Logo */
        .navbar {
            background-color: #1a1a1a;
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #282828;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logo Container - Text aur Image ko align karne ke liye */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px; /* Image aur text ke beech ka gap */
            text-decoration: none;
        }

        /* Circle Logo CSS */
        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%; /* Circle shape ke liye */
            object-fit: cover;
            border: 2px solid #00ffcc;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
            letter-spacing: 1px;
        }

        /* Desktop Menu */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #00ffcc;
        }

        /* Hamburger Menu Icon */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
            padding: 5px;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Hero / Content Section */
        .hero-section {
            padding: 40px 20px;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero-section h1 span {
            color: #00ffcc;
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Auto-Slide Image Box CSS */
        .slider-wrapper {
            width: 100%;
            max-width: 800px;
            height: 300px;
            margin: 30px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s ease-in-out;
        }

        .slider-track img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Bottom Bar (Hidden on Desktop by default) */
        .bottom-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            z-index: 1000;
            padding: 10px 0;
        }

        .bottom-bar a {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.3s ease;
        }

        .bottom-bar a:hover, .bottom-bar a.active {
            color: #00ffcc;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .hamburger {
                display: flex; 
            }

            .nav-links {
                display: none; 
                flex-direction: column;
                width: 100%;
                position: absolute;
                top: 100%; 
                left: 0;
                background-color: #1a1a1a;
                padding: 10px 0;
                border-bottom: 2px solid #282828;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                text-align: center;
                margin: 15px 0;
            }

            .slider-wrapper {
                height: 200px; /* Mobile par slider thoda chota dikhega */
            }

            /* Show Bottom Bar on Mobile */
            .bottom-bar {
                display: flex;
                justify-content: space-around;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <!-- Logo Section -->
        <a href="index.html" class="logo-container">
            <!-- Yahan logo.png ko apni logo file ke naam se badlein -->
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/45/00ffcc/000000?text=DG'">
            <span class="logo-text">DANTANIS GROUP</span>
        </a>
        
        <button class="hamburger" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <!-- Menu Items (Ab alag pages ke links ke sath) -->
        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content & Slider -->
    <main class="hero-section">
        <h1>Welcome to <span>DANTANIS GROUP</span></h1>
        <p>A professional layout customized with gradients, sliders, and navigation.</p>

        <!-- Auto Slide Box -->
        <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">
                <!-- Testing ke liye online images dali hain, aap inhe apni .jpg/.png files se badal sakte hain -->
                <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?w=800&q=80" alt="Slide 1">
                <img src="https://images.unsplash.com/photo-1470770841072-f978ccc4f0e8?w=800&q=80" alt="Slide 2">
                <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800&q=80" alt="Slide 3">
            </div>
        </div>
    </main>

    <!-- Bottom Mobile Bar -->
    <div class="bottom-bar">
        <a href="index.html" class="active">🏠<br>Home</a>
        <a href="about.html">ℹ️<br>About</a>
        <a href="services.html">⚙️<br>Services</a>
        <a href="contact.html">📞<br>Contact</a>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Hamburger Menu Logic
        const menuToggle = document.getElementById('menu-toggle');
        const navList = document.getElementById('nav-list');

        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // Auto-Slide Image Logic
        const track = document.getElementById('slider-track');
        const slides = track.querySelectorAll('img');
        let slideIndex = 0;
        const totalSlides = slides.length;

        function autoSlide() {
            slideIndex++;
            if (slideIndex >= totalSlides) {
                slideIndex = 0; // Wapas pehli image par
            }
            // Image ki width ke hisaab se slide karna (100%, 200%, etc.)
            track.style.transform = `translateX(-${slideIndex * 100}%)`;
        }

        // Har 3 second (3000ms) mein slide change hogi
        setInterval(autoSlide, 3000);
    </script>
</body>
</html>
